<body>
<div class="app">
  <div class="card">
    <div class="header">
      <div><span class="logo-avto">AVTO</span><span class="logo-test">TEST</span><span class="logo-7">7</span></div>
      <div class="header-sub">Учёт времени</div>
    </div>
    <div class="deco-lines"></div>
    <div class="body">

      <div id="screen-select">
        <div class="filial-toggle">
          <button class="filial-btn active" id="filialNovza" onclick="selectFilial('Novza Filial', this)">Novza<br>Filial</button>
          <div class="filial-divider"></div>
          <button class="filial-btn" id="filialYunus" onclick="selectFilial('Yunusobod Filial', this)">Yunusobod<br>Filial</button>
        </div>
        <div class="section-label">Выберите менеджера</div>
        <div class="name-grid" id="nameGrid"></div>
        <button class="btn-start" id="btnStart" onclick="startSession()">
          <svg width="11" height="11" viewBox="0 0 12 12" fill="currentColor"><polygon points="2,1 11,6 2,11"/></svg>
          НАЧАТЬ СМЕНУ
        </button>
        <div class="error-msg" id="errSelect"></div>
      </div>

      <div id="screen-active">
        <div class="active-name" id="activeName"></div>
        <div class="active-since" id="activeSince"></div>
        <div class="status-bar">
          <div class="status-dot"></div>
          <div class="status-text">Смена идёт</div>
        </div>
        <div class="timer-display" id="timerDisplay">00<span class="timer-sep">:</span>00<span class="timer-sep">:</span>00</div>
        <button class="btn-stop" id="btnStop" onclick="stopSession()">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><rect width="10" height="10"/></svg>
          ЗАВЕРШИТЬ СМЕНУ
        </button>
        <div class="error-msg" id="errActive"></div>
      </div>

      <div id="screen-sent">
        <div class="check-box">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="sent-title">Смена завершена</div>
        <div class="sent-sub" id="sentName"></div>
        <div class="sent-duration" id="sentDuration"></div>
        <div class="sent-ok">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Данные отправлены
        </div>
        <button class="btn-reset" onclick="resetToSelect()">← НОВАЯ СМЕНА</button>
      </div>

    </div>

      <div class="footer-text">AVTOTEST7 © 2026</div>
      <div class="clock" id="clockDisplay"></div>
    </div>
  </div>
</div>

<script>
  const WEBHOOK = 'https://n8n.srv1215497.hstgr.cloud/webhook/f2d24888-9723-4e56-96ee-f2dddec2e855';
  const NAMES = ['Ziyoda', 'Muslima', 'Rais', 'Rayhona', 'Jamshid', 'Omina', 'Muxlisa'];

  let selectedName = null, selectedFilial = 'Novza Filial', startTime = null, timerInterval = null;

  function selectFilial(filial, btn) {
    selectedFilial = filial;
    document.querySelectorAll('.filial-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function restoreSession() {
    const saved = localStorage.getItem('avtotest7_session');
    if (!saved) return;
    try {
      const s = JSON.parse(saved);
      if (s.name && s.startTime) {
        selectedName = s.name;
        selectedFilial = s.filial || 'Novza Filial';
        startTime = new Date(s.startTime);
        showActive();
      }
    } catch(e) { localStorage.removeItem('avtotest7_session'); }
  }

  function saveSession() {
    localStorage.setItem('avtotest7_session', JSON.stringify({ name: selectedName, filial: selectedFilial, startTime: startTime.toISOString() }));
  }

  function clearSession() { localStorage.removeItem('avtotest7_session'); }

  function updateClock() {
    const now = new Date();
    document.getElementById('clockDisplay').textContent = pad(now.getHours()) + ':' + pad(now.getMinutes());
  }
  updateClock();
  setInterval(updateClock, 1000);

  const grid = document.getElementById('nameGrid');
  NAMES.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'name-btn';
    btn.textContent = name;
    btn.onclick = () => selectName(name, btn);
    grid.appendChild(btn);
  });

  function selectName(name, btn) {
    document.querySelectorAll('.name-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedName = name;
    document.getElementById('btnStart').classList.add('active');
  }

  async function startSession() {
    if (!selectedName) return;
    startTime = new Date();
    const btn = document.getElementById('btnStart');
    btn.style.opacity = '0.5'; btn.style.pointerEvents = 'none';
    btn.innerHTML = 'ОТПРАВКА...';
    saveSession();
    try {
      await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ event: 'start', name: selectedName, filial: selectedFilial, time: formatTime(startTime), date: formatDate(startTime) })
      });
    } catch(e) { console.warn(e); }
    showActive();
  }

  function showActive() {
    show('screen-active');
    document.getElementById('activeName').textContent = selectedName;
    document.getElementById('activeSince').textContent = 'начало: ' + formatTime(startTime);
    timerInterval = setInterval(updateTimer, 1000);
    updateTimer();
  }

  function updateTimer() {
    const s = Math.floor((Date.now() - startTime) / 1000);
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
    document.getElementById('timerDisplay').innerHTML =
      pad(h) + '<span class="timer-sep">:</span>' + pad(m) + '<span class="timer-sep">:</span>' + pad(sec);
  }

  async function stopSession() {
    clearInterval(timerInterval);
    const endTime = new Date();
    const elapsed = Math.floor((endTime - startTime) / 1000);
    const duration = formatDuration(elapsed);
    const btn = document.getElementById('btnStop');
    btn.style.opacity = '0.5'; btn.style.pointerEvents = 'none';
    btn.innerHTML = 'ОТПРАВКА...';
    try {
      await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          event: 'stop', name: selectedName, filial: selectedFilial,
          date: formatDate(startTime),
          start_time: formatTime(startTime),
          end_time: formatTime(endTime),
          duration_seconds: elapsed, duration_formatted: duration
        })
      });
    } catch(e) {
      document.getElementById('errActive').textContent = 'Ошибка отправки. Запишите время вручную.';
    }
    clearSession();
    document.getElementById('sentName').textContent = selectedName;
    document.getElementById('sentDuration').textContent = duration;
    show('screen-sent');
  }

  function resetToSelect() {
    selectedName = null; startTime = null;
    document.querySelectorAll('.name-btn').forEach(b => b.classList.remove('selected'));
    const sb = document.getElementById('btnStart');
    sb.classList.remove('active'); sb.style.opacity = ''; sb.style.pointerEvents = '';
    sb.innerHTML = '<svg width="11" height="11" viewBox="0 0 12 12" fill="currentColor"><polygon points="2,1 11,6 2,11"/></svg> НАЧАТЬ СМЕНУ';
    const stb = document.getElementById('btnStop');
    stb.style.opacity = ''; stb.style.pointerEvents = '';
    stb.innerHTML = '<svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><rect width="10" height="10"/></svg> ЗАВЕРШИТЬ СМЕНУ';
    show('screen-select');
  }

  function show(id) {
    ['screen-select','screen-active','screen-sent'].forEach(s => {
      document.getElementById(s).style.display = s === id ? 'flex' : 'none';
    });
  }

  function pad(n) { return String(n).padStart(2,'0'); }
  function formatTime(d) { return pad(d.getHours()) + ':' + pad(d.getMinutes()); }
  function formatDate(d) { return d.toLocaleDateString('ru-RU'); }
  function formatDuration(s) {
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
    return h > 0 ? h + 'ч ' + pad(m) + 'м' : m + 'м ' + pad(s%60) + 'с';
  }

  restoreSession();
</script>
</body>
</html>
